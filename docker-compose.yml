version: '3.8'

services:
  game:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chicken-3d-game
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
