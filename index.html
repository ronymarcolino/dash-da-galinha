<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dash da Galinha - Um jogo 3D endless runner feito com Three.js">
  <title>Dash da Galinha</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="score">Ovos: 0</div>
  <div id="start-screen">
    <h1>Dash da Galinha</h1>
    <p>Clique para iniciar</p>
    <div class="instructions">
      <h2>Como Jogar</h2>
      <p>Use <strong>← →</strong> ou <strong>A D</strong> para mover</p>
      <p>Colete os <strong>ovos</strong> para ganhar pontos</p>
      <p>Desvie dos <strong>carros</strong> para não perder!</p>
    </div>
  </div>
  <div id="game-over-screen" style="display: none;">
    <h1>Game Over</h1>
    <p>Clique para reiniciar</p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
